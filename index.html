<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganesa Sastrigal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 20px;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 30px;
            border-radius: 2px;
        }

        .bio {
            font-size: 1.1em;
            color: #555;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            color: #667eea;
            border-radius: 50%;
            text-decoration: none;
            font-size: 1.5em;
            transition: all 0.3s ease;
            border: 2px solid #667eea;
        }

        .social-links a:hover {
            background: #667eea;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .projects-section {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 2px solid #eee;
        }

        .projects-section h2 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        .coming-soon {
            color: #999;
            font-style: italic;
            font-size: 1.05em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2.2em;
            }

            .subtitle {
                font-size: 1.1em;
            }

            .bio {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Ganesa Sastrigal</h1>
            <p class="subtitle">Developer & Creator</p>
            <div class="divider"></div>
        </div>

        <p class="bio">
            Welcome to my personal space. I'm passionate about building innovative solutions and exploring new technologies.
        </p>

</body>
</html>
